name: Build Demo Wiki

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [plugin-updated]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout demo repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TiddlyWiki
        run: npm install tiddlywiki

      - name: Checkout all plugins
        run: |
          mkdir -p wiki/plugins/rimir
          plugins=(
            components
            core-hook
            doc-template
            file-upload
            filesystem-watcher
            git-int
            json-dsl
            realms
            runner
            theme
            typed
            explide
            minver
            statewrap
            appify
            ext-connect
            capture
            diffsync
          )
          for plugin in "${plugins[@]}"; do
            git clone --depth 1 "https://github.com/rimir-cc/tw-${plugin}.git" "wiki/plugins/rimir/${plugin}"
            rm -rf "wiki/plugins/rimir/${plugin}/.git"
          done

      - name: Prepare server-side plugins for static demo
        run: |
          server_plugins=(ext-connect file-upload filesystem-watcher git-int realms runner)
          warning='<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:12px 16px;margin-bottom:16px;color:#664d03;">⚠️ <strong>Demo mode</strong> — This is a server-side plugin. Its core functionality requires a running TiddlyWiki Node.js server and is not available in this static demo. Documentation and settings are shown for reference.</div>'

          for plugin in "${server_plugins[@]}"; do
            dir="wiki/plugins/rimir/${plugin}"

            # Remove all JS modules (server code that would fail without Node deps)
            find "$dir" -name "*.js" -delete
            find "$dir" -name "*.js.meta" -delete

            # Prepend warning banner to readme.tid
            if [ -f "$dir/readme.tid" ]; then
              # Find the blank line separating header from body, insert warning after it
              awk -v warn="$warning" '
                /^$/ && !done { print; print warn; print ""; done=1; next }
                { print }
              ' "$dir/readme.tid" > "$dir/readme.tid.tmp"
              mv "$dir/readme.tid.tmp" "$dir/readme.tid"
            fi
          done

      - name: Build demo wiki
        run: |
          TIDDLYWIKI_PLUGIN_PATH="$(pwd)/wiki/plugins" \
          npx tiddlywiki wiki --output output --build index

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
